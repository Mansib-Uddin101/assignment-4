<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=\, initial-scale=1.0">
    <title>Job Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: 'Geist', sans-serif;
        }
    </style>
</head>
<header>
    <div class="w-3/4 mx-auto mt-14">
        <div>
            <h1 class="text-4xl text-[#002C5C] font-bold">Job Application Tracker</h1>
        </div>
        <div class="flex justify-between">
            <div class="border-1 border-gray-200 rounded-lg w-1/3 m-2 p-5 bg-white">
                <h1 class="text-[#323B49] text-lg">Total</h1>
                <p class="text-3xl font-bold">8</p>
            </div>
            <div class="border-1 border-gray-200 rounded-lg w-1/3 m-2 p-5 bg-white">
                <h1 class="text-[#323B49] text-lg"></h1>Interview</h1>
                <p class="text-3xl font-bold text-[#10B981]">0</p>
            </div>
            <div class="border-1 border-gray-200 rounded-lg w-1/3 m-2 p-5 bg-white">
                <h1 class="text-[#323B49] text-lg"></h1>Rejected</h1>
                <p class="text-3xl font-bold text-[#EF4444]">0</p>
            </div>
        </div>
    </div>
    <hr class="border-gray-300 w-3/4 mx-auto border-t-1 my-7">
</header>

<body class="bg-[#F8FAFC]">
    <div class="w-3/4 mx-auto">
        <h1 class="text-3xl text-[#002C5C] font-bold">Available Jobs</h1>
        <!-- Tab buttons -->
        <section class="mt-6 mb-4 flex gap-3">
            <button class="border-1 border-gray-300 px-3 py-2 rounded-lg bg-white">All</button>
            <button class="border-1 border-gray-300 px-3 py-2 rounded-lg bg-white">Interview</button>
            <button class="border-1 border-gray-300 px-3 py-2 rounded-lg bg-white">Rejected</button>
        </section>
        <!-- Cards -->
        <section class="flex flex-col gap-4">
            <div class="border-1 border-gray-200 bg-white rounded-lg p-6">
                <div>
                    <div>
                        <h1 class="text-2xl text-[#002C5C] font-bold">Mobile First Corp</h1>
                        <p class="text-[#64748B] text-lg">React Native developer</p>
                        <br>
                        <p class="text-[#64748B] text-lg">Remote • Full-time • $130,0000-$175,000</p>
                        <br>
                    </div>
                    <div>
                        <button class="bg-[#EEF4FF] px-3 py-2 text-lg font-medium rounded mb-1">Not Applied</button>
                        <p class="text-lg">Build cross-platform mobile applications using React Native. Work on products
                            used by
                            millions of users worldwide.</p>
                        <br>
                    </div>
                    <div>
                        <button class="border-1 text-[#10B981] px-3 py-2 text-lg font-medium rounded mr-2">Interview</button>
                        <button class="border-1 text-[#EF4444] px-3 py-2 text-lg font-medium rounded">Rejected</button>
                    </div>
                </div>
            </div>
        </section>
    </div>
</body>

</html>
